<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViraWatches | Authority Control</title>
    <style>
        :root { --primary: #000; --accent: #FF0000; --border: #222; --text: #fff; }
        body { background: var(--primary); color: var(--text); font-family: 'Inter', sans-serif; padding: 2rem; }
        
        .admin-container { max-width: 1000px; margin: 0 auto; }
        .creation-box { background: #080808; border: 1px solid var(--border); padding: 2rem; margin-bottom: 3rem; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.65rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); 
            color: #fff; border-radius: 0;
        }

        table { width: 100%; border-collapse: collapse; background: #050505; border: 1px solid var(--border); }
        th { text-align: left; color: #444; font-size: 0.65rem; text-transform: uppercase; padding: 1rem; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid #111; font-size: 0.85rem; }

        .rank-badge { 
            padding: 2px 8px; font-size: 0.6rem; font-weight: bold; border: 1px solid; 
            text-transform: uppercase; display: inline-block;
        }
        /* Dynamic Rank Colors */
        .rank-trainee { color: #888; border-color: #444; }
        .rank-junior { color: #00FF00; border-color: #00FF00; }
        .rank-senior { color: #00AAFF; border-color: #00AAFF; }
        .rank-moderator { color: #FF8800; border-color: #FF8800; }
        .rank-manager { color: #AA00FF; border-color: #AA00FF; }
        .rank-administrator { color: #FF0000; border-color: #FF0000; }

        .btn { background: var(--accent); color: white; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; }
        .btn-action { background: transparent; border: 1px solid #333; color: #888; padding: 4px 8px; cursor: pointer; margin-right: 5px; }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div class="admin-container">
    <h1 style="letter-spacing: 2px; margin-bottom: 0.5rem;">STAFF AUTHORITY <span style="color:var(--accent)">1V</span></h1>
    <p style="color: #444; font-size: 0.8rem; margin-bottom: 2rem;">System Managed Account Generation & Promotion Engine</p>

    <div class="creation-box">
        <div class="form-row">
            <div>
                <label>Employee Name</label>
                <input type="text" id="emp-name" placeholder="Legal Name">
            </div>
            <div>
                <label>Initial Rank</label>
                <select id="emp-rank">
                    <option value="Trainee">Trainee</option>
                    <option value="Junior">Junior Staff</option>
                    <option value="Senior">Senior Staff</option>
                    <option value="Moderator">Moderator</option>
                    <option value="Manager">Manager</option>
                    <option value="Administrator">Administrator</option>
                </select>
            </div>
            <div>
                <label>Security Password</label>
                <input type="password" id="emp-pass" placeholder="Set Access Pin">
            </div>
        </div>
        <button class="btn" onclick="autoGenerateStaff()">Authorize & Generate ID</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Account ID</th>
                <th>Staff Name</th>
                <th>Current Rank</th>
                <th>Management</th>
            </tr>
        </thead>
        <tbody id="staff-table"></tbody>
    </table>
</div>

<script>
    const RANKS = ["Trainee", "Junior", "Senior", "Moderator", "Manager", "Administrator"];
    let staffDb = JSON.parse(localStorage.getItem('vira_staff')) || [];

    function autoGenerateStaff() {
        const name = document.getElementById('emp-name').value;
        const rank = document.getElementById('emp-rank').value;
        const pass = document.getElementById('emp-pass').value;

        if(!name || !pass) return alert("Missing required fields.");

        // Generate Automatic Account Number (VRA-YEAR-RANDOM)
        const year = new Date().getFullYear();
        const rand = Math.floor(1000 + Math.random() * 9000);
        const accId = `VRA-${year}-${rand}`;

        staffDb.push({ acc: accId, name, rank, pass });
        localStorage.setItem('vira_staff', JSON.stringify(staffDb));
        
        renderTable();
        document.getElementById('emp-name').value = '';
        document.getElementById('emp-pass').value = '';
    }

    function renderTable() {
        const table = document.getElementById('staff-table');
        table.innerHTML = staffDb.map((emp, index) => `
            <tr>
                <td><code>${emp.acc}</code></td>
                <td>${emp.name}</td>
                <td><span class="rank-badge rank-${emp.rank.toLowerCase()}">${emp.rank}</span></td>
                <td>
                    <button class="btn-action" onclick="promote(${index})">Promote</button>
                    <button class="btn-action" onclick="terminate(${index})" style="color:#555">Term</button>
                </td>
            </tr>
        `).join('');
    }

    function promote(index) {
        let currentIdx = RANKS.indexOf(staffDb[index].rank);
        if(currentIdx < RANKS.length - 1) {
            staffDb[index].rank = RANKS[currentIdx + 1];
            localStorage.setItem('vira_staff', JSON.stringify(staffDb));
            renderTable();
        }
    }

    function terminate(index) {
        if(confirm("Revoke all access for this ID?")) {
            staffDb.splice(index, 1);
            localStorage.setItem('vira_staff', JSON.stringify(staffDb));
            renderTable();
        }
    }

    renderTable();
</script>

</body>
</html>
