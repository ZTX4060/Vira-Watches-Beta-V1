<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ViraWatches | Secure Gateway v1.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --primary: #000; --accent: #FF0000; --text: #fff; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background: var(--primary); color: var(--text); overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .gateway-container { 
            position: relative; z-index: 10; 
            width: 480px; background: var(--glass); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 2px; padding: 40px; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); 
        }

        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 8px; text-align: center; margin-bottom: 35px; text-transform: uppercase; color: #fff; }
        .logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* Portal Navigation System */
        .portal-nav { display: flex; gap: 5px; margin-bottom: 30px; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 2px; }
        .nav-btn { flex: 1; padding: 10px; background: none; border: none; color: #444; font-size: 0.6rem; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.4s; }
        .nav-btn.active { color: #fff; background: rgba(255,255,255,0.05); box-shadow: 0 0 10px rgba(255,255,255,0.02); }
        .nav-btn:hover:not(.active) { color: #888; }

        .input-group { margin-bottom: 18px; }
        input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.6); 
            border: 1px solid #151515; color: #fff; font-size: 0.8rem; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--accent); }
        
        .btn-auth { 
            width: 100%; padding: 15px; background: none; border: 1px solid var(--accent); 
            color: var(--accent); font-weight: 900; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 4px; font-size: 0.7rem; transition: 0.4s; margin-top: 10px;
        }
        .btn-auth:hover { background: var(--accent); color: #fff; box-shadow: 0 0 25px var(--accent); }
        
        .footer-link { font-size: 0.6rem; color: #333; margin-top: 20px; text-align: center; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .footer-link:hover { color: #666; }
        .footer-link span { color: var(--accent); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="gateway-container" id="gateway">
    <div class="logo">VIRA<span>GATE</span></div>
    
    <div class="portal-nav">
        <button class="nav-btn active" onclick="switchPortal('client')">Client</button>
        <button class="nav-btn" onclick="switchPortal('staff')">Staff</button>
        <button class="nav-btn" onclick="switchPortal('master')">Master</button>
    </div>

    <div id="client-portal" class="portal-section">
        <div id="c-login">
            <div class="input-group"><input type="text" id="c-user" placeholder="Member ID / Email"></div>
            <div class="input-group"><input type="password" id="c-pass" placeholder="Password"></div>
            <button class="btn-auth" onclick="handleAuth('member')">Authorize Client</button>
            <p class="footer-link" onclick="toggleReg()">No Identity? <span>Apply for Membership</span></p>
        </div>
        <div id="c-reg" class="hidden">
            <div class="input-group"><input type="text" placeholder="Legal Name"></div>
            <div class="input-group"><input type="text" placeholder="Username"></div>
            <div class="input-group"><input type="password" placeholder="Access Key"></div>
            <button class="btn-auth" onclick="handleAuth('member')">Create Profile</button>
            <p class="footer-link" onclick="toggleReg()">Existing Client? <span>Verify Identity</span></p>
        </div>
    </div>

    <div id="staff-portal" class="portal-section hidden">
        <div class="input-group"><input type="text" id="s-user" placeholder="Personnel ID"></div>
        <div class="input-group"><input type="password" id="s-pass" placeholder="Security Protocol"></div>
        <button class="btn-auth" onclick="handleAuth('staff')">Verify Credentials</button>
    </div>

    <div id="master-portal" class="portal-section hidden">
        <p style="color:var(--accent); text-align:center; font-size:0.5rem; font-weight:900; letter-spacing:2px; margin-bottom:15px;">SYSTEM LEVEL OVERRIDE</p>
        <div class="input-group"><input type="text" id="m-root" placeholder="Root Administrator"></div>
        <div class="input-group"><input type="password" id="m-key" placeholder="Encrypted Key"></div>
        <button class="btn-auth" onclick="handleMaster()">Execute Override</button>
    </div>

</div>

<script>
    // --- 3D Background Logic ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const geometry = new THREE.IcosahedronGeometry(15, 1);
    const material = new THREE.MeshBasicMaterial({ color: 0x111111, wireframe: true });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    camera.position.z = 30;

    function animate() {
        requestAnimationFrame(animate);
        sphere.rotation.y += 0.0015;
        sphere.rotation.x += 0.001;
        renderer.render(scene, camera);
    }
    animate();

    // --- Portal Logic ---
    function switchPortal(type) {
        const sections = document.querySelectorAll('.portal-section');
        const buttons = document.querySelectorAll('.nav-btn');
        
        gsap.to('#gateway', { opacity: 0, y: 10, duration: 0.3, onComplete: () => {
            sections.forEach(s => s.classList.add('hidden'));
            buttons.forEach(b => b.classList.remove('active'));

            if(type === 'client') {
                document.getElementById('client-portal').classList.remove('hidden');
                buttons[0].classList.add('active');
            } else if(type === 'staff') {
                document.getElementById('staff-portal').classList.remove('hidden');
                buttons[1].classList.add('active');
            } else if(type === 'master') {
                document.getElementById('master-portal').classList.remove('hidden');
                buttons[2].classList.add('active');
            }
            gsap.to('#gateway', { opacity: 1, y: 0, duration: 0.4 });
        }});
    }

    function toggleReg() {
        document.getElementById('c-login').classList.toggle('hidden');
        document.getElementById('c-reg').classList.toggle('hidden');
    }

    function handleMaster() {
        const root = document.getElementById('m-root').value;
        const key = document.getElementById('m-key').value;
        if(root === "admin" && key === "b432-h123@789-s111") {
            sessionStorage.setItem('active_session', JSON.stringify({ name: "System Admin", rank: "Administrator", type: "staff", isMaster: true }));
            location.href = 'master-admin.html';
        } else {
            gsap.to('#gateway', { x: 15, yoyo: true, repeat: 3, duration: 0.05 });
        }
    }

    function handleAuth(role) {
        alert(`${role.toUpperCase()} Authentication Successful.`);
        sessionStorage.setItem('active_session', JSON.stringify({ name: "Authorized User", type: role, rank: role === 'staff' ? 'Trainee' : 'Platinum', wallet: 50000 }));
        location.href = 'dashboard.html';
    }
</script>
</body>
</html>
